name: 🚀 Deploy Frutería Martín → GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: 📦 Restaurar paquetes
        run: dotnet restore PosSystem.Client/PosSystem.Client.csproj

      # PASO CRÍTICO: Parchear ANTES del publish para que los hashes SRI
      # del service worker se generen con la ruta correcta desde el inicio.
      - name: 🔗 Establecer base href correcto ANTES del build
        run: |
          sed -i 's|<base href="/" />|<base href="/fruteria-martin/" />|g' \
            PosSystem.Client/wwwroot/index.html
          echo "✅ base href actualizado a /fruteria-martin/"

      # Deshabilitar el Service Worker en GitHub Pages.
      # El SW causa conflictos de SRI cuando el base href cambia.
      - name: 🚫 Deshabilitar Service Worker para GitHub Pages
        run: |
          sed -i "s|<script>navigator\.serviceWorker\.register('service-worker\.js');</script>||g" \
            PosSystem.Client/wwwroot/index.html
          echo "✅ Service Worker deshabilitado"

      # SQLite NO funciona en el navegador sin compilación nativa WASM.
      # Reemplazamos con InMemory para que la app funcione online.
      - name: 🔄 Reemplazar SQLite con InMemory para producción web
        run: |
          dotnet add PosSystem.Client/PosSystem.Client.csproj package Microsoft.EntityFrameworkCore.InMemory

          sed -i \
            's/options\.UseSqlite("Data Source=localpos\.db")/options.UseInMemoryDatabase("PosLocalDb")/g' \
            PosSystem.Client/Program.cs

          sed -i \
            's/optionsBuilder\.UseSqlite("Data Source=localpos\.db")/optionsBuilder.UseInMemoryDatabase("PosLocalDb")/g' \
            PosSystem.Client/Data/LocalDbContext.cs

          echo "✅ SQLite reemplazado con InMemory"

      - name: 🏗️ Publicar Blazor WebAssembly
        run: >
          dotnet publish PosSystem.Client/PosSystem.Client.csproj
          -c Release
          -o release
          --nologo

      - name: 📄 Crear 404.html para rutas SPA
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: ✅ Asegurar .nojekyll
        run: touch release/wwwroot/.nojekyll

      # Reemplazar el service worker con una versión mínima.
      # El SW generado por Blazor tiene hashes SRI para "/" pero se sirve
      # desde "/fruteria-martin/", causando errores de integridad.
      - name: 🔧 Reemplazar Service Worker con versión limpia
        run: |
          cat > release/wwwroot/service-worker.js << 'EOF'
          // Service Worker deshabilitado para GitHub Pages
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => e.waitUntil(clients.claim()));
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
          EOF
          echo "✅ Service Worker reemplazado"

      - name: 📤 Subir artefacto a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: 🌐 Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
