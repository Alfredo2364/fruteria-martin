name: 🚀 Deploy Frutería Martín → GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restaurar paquetes
        run: dotnet restore PosSystem.Client/PosSystem.Client.csproj

      - name: 🏗️ Publicar Blazor WebAssembly
        run: dotnet publish PosSystem.Client/PosSystem.Client.csproj -c Release -o release --nologo

      - name: 🔗 Corregir base href para GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/fruteria-martin/" />|g' release/wwwroot/index.html

      - name: 📄 Crear 404.html para rutas SPA
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: ✅ Asegurar .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: 📤 Subir artefacto a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: 🌐 Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
