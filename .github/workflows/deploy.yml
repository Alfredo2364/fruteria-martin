name: 🚀 Deploy Frutería Martín → GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: 📦 Restaurar paquetes
        run: dotnet restore PosSystem.Client/PosSystem.Client.csproj

      # SQLite NO funciona en GitHub Pages (requiere código nativo WASM).
      # Para la versión online reemplazamos SQLite con InMemory de EF Core,
      # que funciona 100% en el navegador. Los datos se guardan via API.
      - name: 🔄 Reemplazar SQLite con InMemory para producción web
        run: |
          echo "→ Agregando paquete InMemory..."
          dotnet add PosSystem.Client/PosSystem.Client.csproj package Microsoft.EntityFrameworkCore.InMemory

          echo "→ Parcheando Program.cs..."
          sed -i \
            's/options\.UseSqlite("Data Source=localpos\.db")/options.UseInMemoryDatabase("PosLocalDb")/g' \
            PosSystem.Client/Program.cs

          echo "→ Parcheando LocalDbContext.cs..."
          sed -i \
            's/optionsBuilder\.UseSqlite("Data Source=localpos\.db")/optionsBuilder.UseInMemoryDatabase("PosLocalDb")/g' \
            PosSystem.Client/Data/LocalDbContext.cs

          echo "→ Cambiando using de SQLite a InMemory en Program.cs..."
          sed -i \
            's/using Microsoft\.EntityFrameworkCore;/using Microsoft.EntityFrameworkCore;\nusing Microsoft.EntityFrameworkCore.InMemory;/g' \
            PosSystem.Client/Program.cs

          echo "✅ Parche aplicado correctamente"

      - name: 🏗️ Publicar Blazor WebAssembly
        run: >
          dotnet publish PosSystem.Client/PosSystem.Client.csproj
          -c Release
          -o release
          --nologo

      - name: 🔗 Corregir base href para GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/fruteria-martin/" />|g' release/wwwroot/index.html

      - name: 📄 Crear 404.html para rutas SPA
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: ✅ Asegurar .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: 📤 Subir artefacto a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: 🌐 Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
